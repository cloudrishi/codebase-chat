services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: codebase-chat-db
    environment:
      POSTGRES_DB: ${DB_NAME:-codebase_chat}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-codebase_chat}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    container_name: codebase-chat-ai-worker
    ports:
      - "${AI_WORKER_PORT:-8001}:8001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-codebase_chat}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      ALLOWED_BASE_PATHS: ${ALLOWED_BASE_PATHS:-/tmp}
    volumes:
      - ${REPO_MOUNT_PATH:-/tmp}:${REPO_MOUNT_PATH:-/tmp}:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # backend and frontend — run locally during development:
  #   cd backend && ./mvnw spring-boot:run
  #   cd frontend && npm run dev

volumes:
  postgres_data: